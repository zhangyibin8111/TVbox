name: Auto Update README from JSON

on:
  push:
    branches: [ main, master ]    # 根据主分支名称调整
    paths:
      - 'MultiLine.json'          # 只要这个文件变化就触发


# 🔑关键：授予写入仓库内容的权限
permissions:
  contents: write

jobs:
  GenerateReadme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Generate README.md
        run: node GenerateReadme.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README from JSON"
          git push